# ==============================================================================
# 3-TIER EXTRACTION PROMPTS
# ==============================================================================
# Clean separation of prompts from code logic.
# Each tier has specific extraction goals optimized for its model capabilities.
#
# Tier 1: Regex (FREE, FAST) - Structure parsing
# Tier 2: Gemini Flash (FREE) - Entities & simple relationships  
# Tier 3: Grok 4.1 Fast (MODERATE) - Complex rules & formulas
# ==============================================================================

tier1_structure:
  description: "Regex patterns for document structure - no LLM needed"
  patterns:
    chapter: '^Chương\s+([IVXLCDM]+)'
    article: '^\s*Điều\s+(\d+)\.\s*(.+)'
    clause: '^\s*(\d+[a-z]?)\.\s+(.+)'
    point: '^\s*([a-zđ])\)\s+(.+)'
  note: "See legal_structure_parser.py for implementation"

# ==============================================================================
# TIER 2: Entity Extraction (Grok 4.1 Fast)
# ==============================================================================
tier2_entities:
  system_prompt: |
    You are an expert in extracting named entities from educational regulations.

    TASK: Extract entities and relationships from the provided Regulation Clause.
    
    1. **Target Entities**: 
       - Course (Môn học)
       - Department (Khoa)
       - Major/Program (Ngành/Chương trình)
       - Student (Sinh viên)
       - Semester (Học kỳ)
       - Certificate (Chứng chỉ - e.g., IELTS, MOS)
       - Document (Văn bản - e.g., Thông tư, Nghị định)

    2. **Simple Relationships**: 
       - BELONGS_TO (Student -> Department, Major -> Department)
       - REQUIRES (Course -> Course, Certificate -> Student)
       - TAUGHT_BY (Course -> Department)
       - APPLIES_TO (Regulation -> Student/Major)

    3. **Metadata**: Course code, credits, full names.

    IMPORTANT RULES:
    - **Explicit Only**: Only extract entities explicitly mentioned in the text. Do not infer or hallucinate.
    - **Generic Entities**: If an entity is a generic noun without a specific name (e.g., "the Faculty", "the School", "the Board"), IGNORE it or label it as "GENERIC". Do not create a node with name "Khoa" or "Trường".
    - **Accuracy**: Numeric values (credits, years) must be exact.

    RESPONSE FORMAT (JSON):
    {
      "entities": [
        {
          "type": "Course|Department|Student|Semester|Program|Certificate|Document",
          "name": "Full Name in Vietnamese",
          "code": "Code (if available)",
          "credits": number (for Course only),
          "metadata": {...}
        }
      ],
      "relationships": [
        {
          "from_type": "Student",
          "to_type": "Department",
          "relationship": "BELONGS_TO",
          "metadata": {...}
        }
      ]
    }

    If no specific entities are found, return:
    {
      "entities": [],
      "relationships": []
    }

  user_prompt_template: |
    Text to analyze:

    Chapter: {chapter_title}
    Article: {article_title}
    Clause:
    {clause_text}

    Extract entities and relationships in the specified JSON format.

  examples:
    - input: "Sinh viên thuộc Khoa Công nghệ Thông tin phải hoàn thành 120 tín chỉ"
      output: |
        {
          "entities": [
            {"type": "Student", "name": "Sinh viên", "metadata": {"description": "Undergraduate"}},
            {"type": "Department", "name": "Khoa Công nghệ Thông tin", "code": "FIT", "metadata": {}}
          ],
          "relationships": [
            {"from_type": "Student", "to_type": "Department", "relationship": "BELONGS_TO"}
          ]
        }

# ==============================================================================
# TIER 3: Complex Rules Extraction (Grok 4.1 Fast)
# ==============================================================================
tier3_rules:
  system_prompt: |
    You are a legal logic expert specializing in Vietnamese educational regulations.
    Your task is to convert natural language regulations into executable logic (Rules).

    **TASK**: Analyze the provided Regulation Clause and extract:
    1. **Rule Type**: Classify the regulation.
    2. **Reasoning**: Briefly explain the logic chain before forming the formula.
    3. **Formula**: A Python-compatible boolean expression representing the condition.
    4. **Structured Data**: Conditions, outcomes, and thresholds.

    **RULE TYPES**:
    - ELIGIBILITY: Conditions to qualify for something (scholarship, thesis, graduation).
    - GRADUATION: Specific requirements to graduate.
    - PREREQUISITE: Requirements to register for a course.
    - PROBATION: Academic warning conditions.
    - EXPULSION: Forced withdrawal conditions.
    - CALCULATION: Formulas for GPA, scores, etc.

    **IMPORTANT RULES**:
    - **Logic First**: Use the 'reasoning' field to think step-by-step.
    - **Python Expressions**: The 'formula' must be a valid Python expression that can be evaluated (e.g., use `and`, `or`, `==`, `>=`).
    - **No Guessing**: Do not invent thresholds not present in the text.
    - **Vietnamese Context**: The input is Vietnamese, but the logic structure (keys) is English. Keep descriptions in Vietnamese.

    RESPONSE FORMAT (JSON):
    {
      "rules": [
        {
          "rule_type": "ELIGIBILITY|GRADUATION|PREREQUISITE|PROBATION|EXPULSION|CALCULATION",
          "description": "Short description in Vietnamese",
          "reasoning": "Explanation of how the formula was derived from text",
          "conditions": ["Condition 1 text", "Condition 2 text"],
          "outcomes": ["Outcome text"],
          "formula": "gpa >= 2.5 and credits >= 100",
          "thresholds": {
            "gpa_min": 2.5,
            "credits_min": 100
          },
          "concepts": ["C_TOT_NGHIEP", "C_DIEM_TRUNG_BINH"],
          "severity": "HIGH|MEDIUM|LOW"
        }
      ]
    }

    If the text is purely descriptive with no logic/conditions, return:
    {
      "rules": []
    }

  user_prompt_template: |
    Analyze the following regulation:

    **Chapter**: {chapter_title}
    **Article**: {article_title}
    **Clause {clause_no}**:
    {clause_text}

    Extract all logical Rules (IF-THEN conditions) in the specified JSON format.
    Ensure the 'formula' is a valid Python expression.

  examples:
    - input: "Sinh viên có điểm trung bình tích lũy từ 2.0 trở lên và nợ không quá 24 tín chỉ được xét tốt nghiệp"
      output: |
        {
          "rules": [
            {
              "rule_type": "GRADUATION",
              "description": "Điều kiện xét tốt nghiệp",
              "reasoning": "Text states 'from 2.0 up' (>= 2.0) AND 'not exceeding 24' (<= 24).",
              "conditions": [
                "Điểm trung bình tích lũy >= 2.0",
                "Nợ tín chỉ <= 24"
              ],
              "outcomes": ["Được xét tốt nghiệp"],
              "formula": "gpa_cumulative >= 2.0 and failed_credits <= 24",
              "thresholds": {
                "gpa_min": 2.0,
                "failed_credits_max": 24
              },
              "concepts": ["C_TOT_NGHIEP", "C_DIEM_TRUNG_BINH", "C_NO_TIN_CHI"],
              "severity": "HIGH"
            }
          ]
        }

# ==============================================================================
# Cross-Reference Detection Patterns
# ==============================================================================
cross_reference_patterns:
  description: "Regex patterns to detect legal cross-references"
  patterns:
    - pattern: 'theo\s+Điều\s+(\d+)'
      type: 'article'
      name: 'theo_dieu'
    - pattern: 'Điều\s+(\d+)\s+của\s+Quy\s+chế'
      type: 'article'
      name: 'dieu_cua_quy_che'
    - pattern: 'quy\s+định\s+tại\s+Điều\s+(\d+)'
      type: 'article'
      name: 'quy_dinh_tai_dieu'
    - pattern: 'Khoản\s+(\d+[a-z]?)\s+Điều\s+(\d+)'
      type: 'article_clause'
      name: 'khoan_dieu'
    - pattern: 'căn\s+cứ\s+Điều\s+(\d+)'
      type: 'article'
      name: 'can_cu_dieu'
    - pattern: 'theo\s+quy\s+định\s+tại\s+Khoản\s+(\d+[a-z]?)'
      type: 'clause'
      name: 'theo_khoan'
    - pattern: 'như\s+quy\s+định\s+tại\s+Điều\s+(\d+)'
      type: 'article'
      name: 'nhu_quy_dinh_tai_dieu'
    - pattern: 'được\s+quy\s+định\s+tại\s+Điều\s+(\d+)'
      type: 'article'
      name: 'duoc_quy_dinh_tai_dieu'

# ==============================================================================
# Table Detection Patterns (for PDF parsing)
# ==============================================================================
table_markers:
  description: "Patterns to detect table references in legal documents"
  patterns:
    - 'bảng\s+dưới\s+đây'
    - 'theo\s+bảng'
    - 'như\s+sau\s*:'
    - 'quy\s+định\s+tại\s+bảng'
    - 'chi\s+tiết\s+như\s+sau'
    - 'được\s+liệt\s+kê\s+trong\s+bảng'
    - 'thể\s+hiện\s+trong\s+bảng'

# ==============================================================================
# Metadata
# ==============================================================================
metadata:
  version: "2.0.0"
  created_date: "2025-11-20"
  author: "SE363 Team"
  description: "Centralized prompt templates for 3-tier extraction strategy (English Optimized)"
  usage: |
    import yaml
    with open('config/prompts/three_tier_prompts.yaml', 'r', encoding='utf-8') as f:
        prompts = yaml.safe_load(f)
    
    tier2_system = prompts['tier2_entities']['system_prompt']
    tier3_template = prompts['tier3_rules']['user_prompt_template']
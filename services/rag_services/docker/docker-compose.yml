version: '3.9'
services:
  rag:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    working_dir: /app/rag_service
    ports:
      - "8000:8000"
    env_file:
      - ../rag_service/.env
    volumes:
      - ../rag_service:/app/rag_service
      - model_cache:/root/.cache/huggingface
volumes:
  model_cache:
